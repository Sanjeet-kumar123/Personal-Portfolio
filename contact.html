<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <div class="contact-container">
    <h1>Contact Me</h1>
    <p>Feel free to reach out to me.</p>

    <form action="https://formsubmit.co/sanjeetkr840604@gmail.com" method="POST">
      
      <input
        type="text"
        name="name"
        placeholder="Your Name"
        required
      >

      <input
        type="email"
        name="email"
        placeholder="Your Email"
        required
      >

      <textarea
        name="message"
        rows="6"
        placeholder="Your Message"
        required
      ></textarea>

      <button type="submit">
        Send Message
      </button>

    </form>

    <a href="index.html" class="back-btn">
      ← Back to Portfolio
    </a>

  </div>

  <script src="contact.js"></script>

</body>
</html>
